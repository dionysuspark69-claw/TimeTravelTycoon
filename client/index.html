<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <title>ChronoTransit - Time Travel Idle Game</title>
    <meta name="description" content="Run a time travel business in this idle incremental game. Transport customers through history, upgrade your time machine, and build a chrono-empire across the ages." />

    <meta property="og:description" content="Transport customers through history in this free idle incremental game. Upgrade your time machine, unlock new eras, and build a chrono-empire." />
    <meta property="og:type" content="website" />
    <link rel="canonical" href="https://timetraveltycoon.onrender.com/" />
    <meta property="og:url" content="https://timetraveltycoon.onrender.com/" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "ChronoTransit",
      "description": "A free browser-based idle incremental game where you run a time travel business. Transport customers through historical eras, upgrade your time machines, and build a chrono-empire.",
      "genre": ["Idle Game", "Incremental Game", "Strategy"],
      "gamePlatform": "Web Browser",
      "applicationCategory": "Game",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "url": "https://timetraveltycoon.onrender.com"
    }
    </script>
    <!-- AdSense loaded after page content is ready, not on initial shell -->
  </head>
  <body>
    <div id="root"></div>

    <!-- Visible content for crawlers / no-script users -->
    <noscript>
      <div style="font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px;">
        <h1>ChronoTransit - Time Travel Idle Game</h1>
        <p>ChronoTransit is a free browser-based idle incremental game where you run a time travel business. Transport customers to historical eras, upgrade your time machines, hire managers, and build a chrono-empire across history.</p>
        <h2>Features</h2>
        <ul>
          <li>50+ unlockable time travel destinations from the Dinosaur Era to the Galactic Empire</li>
          <li>Upgrade your time machine fleet for speed, capacity, and revenue</li>
          <li>Hire managers with unique perks and bonuses</li>
          <li>Discover rare artifacts and complete collections</li>
          <li>Prestige system for long-term progression</li>
          <li>Global leaderboards</li>
          <li>Missions and achievements</li>
        </ul>
        <p>Please enable JavaScript to play ChronoTransit.</p>
      </div>
    </noscript>

    <div id="replit-auth-container" style="display: none;">
      <script 
        authed="window.handleReplitAuth && window.handleReplitAuth()" 
        src="https://auth.util.repl.co/script.js"
      ></script>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
